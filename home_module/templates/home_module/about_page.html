{% extends 'shared/_layout.html' %}
{% block title %}
	درباره  ما
{% endblock %}
{% block content %}
    <div class="about-us-section container-fluid rtl">
    <h2 class="section-title position-relative text-uppercase mx-xl-5 mb-4">
        <span class="bg-secondary pr-3">درباره ما</span>
    </h2>
    <div class="row px-xl-5">
        <div class="col-lg-7 mb-5">
            <div class="contact-form bg-light p-30">
                <div id="success"></div>
                <p>{{ site_setting.about_us_text }}</p>

                <!-- تصویر زیبا در زیر پاراگراف درباره ما -->
                <div class="about-image">
                    <img src="/static/images/gallery-3.jpg" alt="درباره ما" class="img-fluid rounded shadow">
                </div>
            </div>
        </div>
        <div class="col-lg-5 mb-5">
            <div class="bg-light p-30 mb-30">
                <iframe style="width: 100%; height: 250px;"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.8354345093644!2d50.9029667!3d35.8200488!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzXCsDQ5JzE3LjgiTiA1MMKwNTQnMTIuNyJF!5e0!3m2!1sen!2us!4v1700000000000"
                        frameborder="0" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
            </div>
            <div class="bg-light p-30 mb-3">
                <p class="mb-2">
                    <i class="fa fa-map-marker-alt text-primary mr-3"></i>
                    {{ site_setting.addres }}
                </p>
                <p class="mb-2">
                    <i class="fa fa-envelope text-primary mr-3"></i>
                    {{ site_setting.email }}
                </p>
                <p class="mb-2">
                    <i class="fa fa-phone-alt text-primary mr-3"></i>
                    {{ site_setting.phone }}
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
